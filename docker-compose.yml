# Explicit project name so it never accidentally collides with
# docker-compose.test.yml's "diet_ai_test" — see that file for why.
name: diet_ai

services:
  db:
    image: postgres:16-alpine
    container_name: diet_ai_db
    environment:
      POSTGRES_DB: diet_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d diet_ai"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: diet_ai_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Small local model (~1.3GB), enough for simple chat responses without a GPU.
  # Swap OLLAMA_MODEL below to any other tag pulled here if you need something bigger.
  ollama:
    image: ollama/ollama:latest
    container_name: diet_ai_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        until ollama list >/dev/null 2>&1; do sleep 1; done
        ollama pull llama3.2:1b
        wait
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q llama3.2:1b"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  # SMTP catcher for local dev — password-reset emails land here instead of a
  # real inbox. No auth, no TLS. Web UI at http://localhost:8025.
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: diet_ai_mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI + API
    restart: unless-stopped

  # Local SFTP server — diet-plan CSV exports are archived here (see Phase 9
  # Stage 4) so a user can re-download a previously generated export without
  # regenerating it. "dietai:dietai:::upload" creates user dietai/password
  # dietai with an "upload" dir that appears as /upload from the SFTP side
  # (chrooted to the user's home).
  sftp:
    image: atmoz/sftp:alpine
    container_name: diet_ai_sftp
    ports:
      - "2222:22"
    command: ["dietai:dietai:::upload"]
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 22"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Single-node Kafka in KRaft mode (broker + controller combined, no
  # Zookeeper) — the modern minimal setup, appropriate for a demo rather
  # than a multi-broker production cluster. CLUSTER_ID is just a fixed
  # local identifier for this one-node cluster's storage format, not
  # registered anywhere external — reused from Apache's own KRaft example.
  kafka:
    image: apache/kafka:3.8.0
    container_name: diet_ai_kafka
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "9094:9094"
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9094"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: diet_ai_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diet_ai_backend
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy
      ollama:
        condition: service_healthy
      mailhog:
        condition: service_started
      sftp:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: dev
      APP_DEBUG: "true"
      LOG_LEVEL: INFO

      # The frontend/frontend-admin services below are reachable from the
      # host at these origins (Vite dev servers); the backend itself is
      # called browser-side, not container-to-container, so these must be
      # the host-visible origins.
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174

      # Mock passes every request through — a real deployment sets this to
      # "turnstile" plus a real CAPTCHA_SECRET_KEY.
      CAPTCHA_PROVIDER: mock
      CAPTCHA_SECRET_KEY: ""

      POSTGRES_URL: postgresql+asyncpg://postgres:postgres@db:5432/diet_ai
      MONGO_URL: mongodb://mongo:27017

      # Dev-only placeholder, 32+ bytes to satisfy PyJWT's own minimum
      # recommended HS256 key length (a shorter value previously here
      # triggered a real InsecureKeyLengthWarning on every request) —
      # still a "change-me" value, rotate for any real deployment.
      JWT_SECRET_KEY: vh8hQ546ZThSx-yJwvaN9UM1eZYjAcmwIseqmvez2Bs-change-me-in-prod
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TTL_MINUTES: 15
      JWT_REFRESH_TTL_DAYS: 7

      AI_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2:1b
      ANTHROPIC_API_KEY: ""
      ANTHROPIC_MODEL: claude-opus-4-8

      EMAIL_PROVIDER: smtp
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_FROM_ADDRESS: noreply@dietai.local

      KAFKA_PROVIDER: kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      RATE_LIMIT_PROVIDER: redis
      REDIS_URL: redis://redis:6379/0

      SFTP_PROVIDER: sftp
      SFTP_HOST: sftp
      SFTP_PORT: "22"
      SFTP_USERNAME: dietai
      SFTP_PASSWORD: dietai
      SFTP_REMOTE_DIR: /upload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload --timeout-graceful-shutdown 30
    # Slightly above --timeout-graceful-shutdown above, so Compose doesn't
    # SIGKILL before uvicorn's own graceful window has a chance to finish.
    # Note: this drains normal in-flight requests, but a request blocked on a
    # slow external call (e.g. an AI provider) can still be cut — uvicorn
    # closes active connections on shutdown rather than waiting on arbitrary
    # external I/O, which is standard ASGI-server behavior, not fixable here.
    stop_grace_period: 35s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: diet_ai_frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
      VITE_ADMIN_PANEL_URL: http://localhost:5174
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    restart: unless-stopped

  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: diet_ai_frontend_admin
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
      VITE_MAIN_APP_URL: http://localhost:5173
    ports:
      - "5174:5174"
    volumes:
      - ./frontend-admin:/app
      - /app/node_modules
    command: npm run dev -- --host --port 5174
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  ollama_data:
  kafka_data: