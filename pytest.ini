[pytest]
pythonpath = .
env =
    TESTING=1
    JWT_SECRET_KEY=test-jwt-secret-key-32-chars-minimum!!
    POSTGRES_URL=postgresql+asyncpg://postgres:postgres@localhost:5433/diet_ai_test
    MONGO_URL=mongodb://localhost:27018

testpaths =
    backend/tests
    backend/modules/identity/tests
    backend/modules/conversation/tests
    backend/modules/ai/tests
    backend/modules/nutrition/tests
    backend/modules/dietitian/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*